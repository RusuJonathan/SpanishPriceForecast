lgbm:
  num_leaves:
    distribution: IntUniformDistribution
    low: 10
    high: 100
  max_depth:
    distribution: IntUniformDistribution
    low: 1
    high: 10
  learning_rate:
    distribution: LogUniformDistribution
    low: 0.001
    high: 0.2
  n_estimators:
    distribution: IntUniformDistribution
    low: 50
    high: 1000
  subsample:
    distribution: UniformDistribution
    low: 0.2
    high: 1.0
  colsample_bytree:
    distribution: UniformDistribution
    low: 0.2
    high: 1.0
  reg_lambda:
    distribution: LogUniformDistribution
    low: 0.5
    high: 5.0
  reg_alpha:
    distribution: LogUniformDistribution
    low: 0.1
    high: 5.0
  min_child_weight:
    distribution: LogUniformDistribution
    low: 1
    high: 20